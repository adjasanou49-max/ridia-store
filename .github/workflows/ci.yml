name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Backend - lint, tests, build
    runs-on: ubuntu-latest
    # Prisma lit DATABASE_URL directement depuis process.env dès l'instanciation du
    # client (à l'import du fichier, pas juste à la requête) - sans ça, les tests
    # plantent immédiatement avec "Environment variable not found: DATABASE_URL",
    # même si aucun test ne touche vraiment la base. Valeurs factices, aucune vraie
    # connexion n'est nécessaire pour lint/tests unitaires/build.
    env:
      DATABASE_URL: 'postgresql://ci:ci@localhost:5432/ci_placeholder'
      REDIS_URL: 'redis://localhost:6379'
      JWT_ACCESS_SECRET: 'ci-placeholder-access-secret'
      JWT_REFRESH_SECRET: 'ci-placeholder-refresh-secret'
      ENCRYPTION_KEY: 'ci-placeholder-32-characters-key'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Lint
        working-directory: backend
        run: npm run lint --if-present

      - name: Tests
        working-directory: backend
        run: npm test --if-present

      - name: Build
        working-directory: backend
        run: npm run build

  frontend:
    name: Frontend - lint, tests, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Tests
        working-directory: frontend
        run: npm test

      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000/api
        run: npm run build
